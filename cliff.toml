[changelog]
header = """# Changelog

All notable changes to this project are documented here.

"""
body = """

{% if version -%}
    ## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## Unreleased
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}{{ commit.scope }}: {% endif %}{{ commit.message | upper_first }}\
{% if commit.breaking %} **BREAKING**{% endif %}
{%- endfor %}
{% endfor %}
"""
footer = ""
trim = true
# Strip HTML comment prefixes used for group ordering
postprocessors = [
    { pattern = "<!-- [0-9] -->", replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Order matters: groups sorted alphabetically, HTML comments control display order
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^doc", group = "<!-- 2 -->Documentation" },
    { message = "^perf", group = "<!-- 3 -->Performance" },
    { message = "^refactor", group = "<!-- 4 -->Refactor" },
    { message = "^test", group = "<!-- 5 -->Testing" },
    { message = "^build", group = "<!-- 6 -->Build" },
    # Internal bookkeeping — keep out of the user-facing changelog
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore: release", skip = true },
    { message = "^task", skip = true },
    { message = "^wip", skip = true },
    { message = "^Bump version", skip = true },
    { message = "^chore|^ci", group = "<!-- 7 -->Miscellaneous" },
    { message = "^style", group = "<!-- 8 -->Styling" },
    { body = ".*security", group = "<!-- 9 -->Security" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
