api_id: 0
api_hash: ""
session: data/session
log_level: info
# proxy_url: socks5://127.0.0.1:1080
openai_api_key: ""
openai_model: gpt-4.1-mini
langfuse_public_key: ""
langfuse_secret_key: ""
langfuse_base_url: ""
ignore_usernames: []
ignore_user_ids: []
instances:
  - name: default
    entities:
      - https://t.me/tboom_66
    folders: []
    folder_add_topic:
      - name: Community Updates
        message: "/activate@example_updates_bot"
        username: "@example_updates_bot"
    folder_mute: false
    no_forward_message: false
    # Configurable forwarded-message preface (sent before each forwarded message).
    # With none of the keys below set, output is identical to the default:
    #   word: my username
    #
    #   Forwarded from: private @username, Name: User Name
    # no_forward_message: true suppresses the preface entirely and wins over these.
    #
    # Option 1 - full template (overrides the layout). Placeholders render missing
    # values as "" and never raise: {trigger}, {source}, {username}, {name}, {chat}.
    # message_template: "{trigger}\n{source}"
    #
    # Option 2 - flags + wrap (used only when message_template is absent):
    # forward_message:
    #   show_trigger: true   # include the match reason ({trigger})
    #   show_source: true    # include the "Forwarded from: ..." line ({source})
    #   prefix: ""           # free text prepended to the preface
    #   suffix: ""           # free text appended to the preface
    # Forward only the first match per chat per day, then suppress further
    # matches in that chat until the daily reset hour. State persists across
    # restarts in data/seen_chats.json. Default: false (forward every match).
    once_per_chat: false
    # Local server hour (0-23) at which once_per_chat re-arms each chat.
    # Default: 6 (06:00). Ignored when once_per_chat is false.
    reset_hour: 6
    # Debounce batching in milliseconds. When > 0, a trigger does not forward
    # immediately; instead the instance keeps a rolling per-chat buffer of recent
    # messages and, after debounce_ms of silence, forwards the whole batch under
    # a single match header (capturing context before and after the trigger).
    # Each new message (any sender) resets the timer. Default: 0 (forward now).
    # Example timeline with debounce_ms: 60000 (60s):
    #   10:00:00  "anyone around?"          -> buffered (pre-trigger context)
    #   10:00:30  "my username, help!"      -> trigger, batch starts, timer set
    #   10:00:50  "actually figured it out" -> buffered, timer reset
    #   10:01:50  (60s of silence elapsed)  -> all three forwarded together
    debounce_ms: 0
    # When debounce_ms > 0 and an ignored username (account owner, from
    # ignore_usernames / ignore_usernames_override) posts during the debounce
    # window, drop the accumulated batch and forward nothing. Default: true
    # (opt-out). No effect when debounce_ms is 0.
    cancel_on_owner_reply: true
    # Optional per-instance override of the global `ignore_usernames`.
    # If set (even to an empty list), this instance ignores the global list
    # and uses this one. If omitted, the global `ignore_usernames` applies.
    # ignore_usernames_override: []
    words: ["my username"]
    negative_words: []
    ignore_words: []
    prompts:
      - name: example
        prompt: Сообщение содержит недовольство.
        threshold: 4
        # Uncomment to load prompt text from Langfuse
        # langfuse_name: movie-critic
        # langfuse_label: production
        # langfuse_version: 1
        # langfuse_type: text
        # config:
        #   model: gpt-4o
        #   temperature: 0.7
    target_chat: 0
    target_entity: ""
    # Optional: POST matched messages to an HTTP endpoint.
    # format: "text" (single line, default) or "json" (object with metadata).
    # target_webhook:
    #   url: http://127.0.0.1:8002/webhook
    #   format: text
    # target_webhook:
    #   url: http://127.0.0.1:8002/webhook
    #   format: json
    false_positive_entity: ""
    true_positive_entity: ""
